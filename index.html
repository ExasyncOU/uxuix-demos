<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UXUIX – Interaktive Demos</title>
  <style>
    body { font-family: Segoe UI, sans-serif; background: #0f1117; color: #e8eaf0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { text-align: center; max-width: 480px; padding: 40px 20px; }
    .logo { font-size: 40px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    .logo span { color: #6c8aff; }
    .sub { color: #7c82a0; font-size: 15px; margin-bottom: 32px; }
    .demo-link { display: block; background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 18px 24px; margin-bottom: 12px; text-decoration: none; color: #e8eaf0; transition: all 0.2s; }
    .demo-link:hover { border-color: #4f6ef7; background: #222535; }
    .demo-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .demo-desc { font-size: 13px; color: #7c82a0; }
    .badge { display: inline-block; background: rgba(79,110,247,0.2); color: #6c8aff; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">UX<span>UIX</span></div>
    <div class="sub">Interaktive Prozessautomatisierungs-Demos</div>
    <a class="demo-link" href="hohenester-demo.html">
      <div class="badge">Agrarhandel</div>
      <div class="demo-title">🌾 Hohenester Agrarhandel</div>
      <div class="demo-desc">E-Mail Bestelleingang → automatischer Excel-Eintrag</div>
    </a>
  </div>
</body>
</html>
